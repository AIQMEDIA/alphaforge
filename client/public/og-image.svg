<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </radialGradient>
    
    <!-- Tech pattern -->
    <pattern id="techPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <circle cx="20" cy="20" r="1" fill="#3b82f6" opacity="0.3"/>
      <path d="M10,20 L30,20 M20,10 L20,30" stroke="#3b82f6" opacity="0.2" stroke-width="0.5"/>
    </pattern>
    
    <!-- Quantum glow -->
    <filter id="quantumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Text shadow -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#techPattern)" opacity="0.1"/>
  
  <!-- Main AlphaForge Logo (Centered and Larger) -->
  <g transform="translate(300, 120)">
    <!-- Circuit A shape -->
    <path d="M200 180 L280 60 L360 60 L440 180 L380 180 L340 120 L300 120 L260 180 Z" 
          fill="none" 
          stroke="#00d4ff" 
          stroke-width="4" 
          filter="url(#quantumGlow)"/>
    
    <!-- Inner circuit lines -->
    <path d="M220 160 L240 140 M260 140 L280 160 M300 160 L320 140 M340 140 L360 160 M380 160 L400 140 M420 140 L440 160" 
          stroke="#00d4ff" 
          stroke-width="2" 
          opacity="0.8"/>
    
    <!-- Circuit nodes -->
    <circle cx="230" cy="150" r="3" fill="#00d4ff" filter="url(#quantumGlow)"/>
    <circle cx="270" cy="150" r="3" fill="#00d4ff" filter="url(#quantumGlow)"/>
    <circle cx="310" cy="150" r="3" fill="#00d4ff" filter="url(#quantumGlow)"/>
    <circle cx="350" cy="150" r="3" fill="#00d4ff" filter="url(#quantumGlow)"/>
    <circle cx="390" cy="150" r="3" fill="#00d4ff" filter="url(#quantumGlow)"/>
    
    <!-- Rising chart bars integrated -->
    <rect x="250" y="140" width="15" height="40" fill="#00d4ff" opacity="0.7"/>
    <rect x="270" y="125" width="15" height="55" fill="#00d4ff" opacity="0.8"/>
    <rect x="290" y="110" width="15" height="70" fill="#00d4ff" opacity="0.9"/>
    <rect x="310" y="95" width="15" height="85" fill="#00d4ff"/>
    <rect x="330" y="80" width="15" height="100" fill="#00d4ff"/>
    
    <!-- Upward arrow -->
    <path d="M360 100 L380 80 L400 100 M380 80 L380 140" 
          stroke="#fbbf24" 
          stroke-width="4" 
          fill="none" 
          filter="url(#quantumGlow)"/>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="280" 
        text-anchor="middle" 
        font-family="Arial Black, sans-serif" 
        font-size="72" 
        font-weight="900" 
        fill="#ffffff" 
        filter="url(#textShadow)">ALPHAFORGE</text>
  
  <!-- Subtitle -->
  <text x="600" y="330" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        font-weight="600" 
        fill="#00d4ff">QUANTUM TRADING BOT SYSTEM</text>
  
  <!-- Key Features -->
  <g transform="translate(150, 380)">
    <!-- Quantum Computing Badge -->
    <rect x="0" y="0" width="280" height="50" rx="25" fill="#7c3aed" opacity="0.9"/>
    <text x="140" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
      🔬 QUANTUM COMPUTING
    </text>
    
    <!-- Real Market Data Badge -->
    <rect x="300" y="0" width="250" height="50" rx="25" fill="#059669" opacity="0.9"/>
    <text x="425" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
      📈 REAL MARKET DATA
    </text>
    
    <!-- Performance Based Badge -->
    <rect x="570" y="0" width="280" height="50" rx="25" fill="#dc2626" opacity="0.9"/>
    <text x="710" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
      💎 PERFORMANCE-BASED
    </text>
  </g>
  
  <!-- Call to Action -->
  <text x="600" y="500" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        font-weight="600" 
        fill="#fbbf24">60-Day Free Trial • Pay Only When You Profit</text>
  
  <!-- Website URL -->
  <text x="600" y="540" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="20" 
        font-weight="400" 
        fill="#94a3b8">alpha-forge.replit.app</text>
  
  <!-- Quantum particles animation effect -->
  <g opacity="0.6">
    <circle cx="150" cy="150" r="2" fill="#00d4ff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="200" r="2" fill="#7c3aed">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="400" r="2" fill="#fbbf24">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="500" r="2" fill="#00d4ff">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Connecting quantum lines -->
  <g opacity="0.3">
    <path d="M150 150 Q 400 100 600 200 T 1050 200" 
          stroke="#00d4ff" 
          stroke-width="1" 
          fill="none">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M100 400 Q 300 350 600 400 T 1100 500" 
          stroke="#7c3aed" 
          stroke-width="1" 
          fill="none">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>